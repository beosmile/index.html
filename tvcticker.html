<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVC Ticker Demo — Nattoenzym</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Roboto:wght@700&family=Oswald:wght@600&family=Bebas+Neue&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 24px; gap: 24px; }
header { text-align: center; }
header h1 { font-size: 18px; font-weight: 600; color: #111; }
header p { font-size: 13px; color: #888; margin-top: 4px; }
.main { display: flex; gap: 28px; align-items: flex-start; width: 100%; max-width: 720px; }
.screen-col { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.screen-label { font-size: 11px; color: #aaa; letter-spacing: .5px; }
#tvc-wrap { width: 270px; height: 480px; position: relative; border-radius: 10px; overflow: hidden; border: 2px solid #2a2a2a; background: #0c0c0c; cursor: pointer; }
#ad-video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }


#live-badge span { font-size: 9px; color: rgba(255,255,255,.75); letter-spacing: 1px; font-weight: 700; }
#to { position: absolute; bottom: 0; left: 0; right: 0; overflow: hidden; z-index: 5; }
#ts { position: absolute; white-space: nowrap; color: #fff; font-weight: 700; letter-spacing: .4px; padding: 0 6px; }
  
#overlay { position: absolute; inset: 0; z-index: 6; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.8); }
#overlay-msg { font-size: 11px; color: rgba(255,255,255,0.5); text-align: center; padding: 0 20px; line-height: 1.7; }
#play-btn { display: none; padding: 8px 20px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
.ctrl-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
label.lbl { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
label.lbl b { font-weight: 600; color: #111; }
label.lbl small { font-size: 11px; color: #aaa; }
textarea, input[type=range] { width: 100%; }
textarea { resize: vertical; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-family: inherit; background: #fff; color: #111; outline: none; transition: border-color .15s; }
textarea:focus { border-color: #888; }
input[type=range] { accent-color: #333; cursor: pointer; }
.pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill { flex: 1; padding: 6px 4px; font-size: 11px; text-align: center; cursor: pointer; border: 1px solid #ddd; color: #777; background: #fff; border-radius: 6px; white-space: nowrap; transition: all .12s; user-select: none; }
.pill:hover { border-color: #bbb; color: #333; }
.pill.on { border-color: #333; color: #111; background: #f0f0f0; font-weight: 500; }
.swatches { display: flex; gap: 7px; }
.sw { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
.sw.on { outline: 2.5px solid #111; outline-offset: 2px; }
.two-col { display: flex; gap: 16px; align-items: flex-start; }
.two-col > div { flex: 1; }
.actions { display: flex; gap: 8px; }
.btn { flex: 1; padding: 10px; font-size: 13px; font-weight: 500; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #111; cursor: pointer; transition: background .12s; font-family: inherit; }
.btn:hover { background: #f5f5f5; border-color: #aaa; }
.btn.icon { flex: 0 0 auto; padding: 10px 14px; font-size: 15px; }
.hint { font-size: 12px; color: #aaa; line-height: 1.6; }
.hint kbd { font-family: monospace; font-size: 11px; background: #f0f0f0; border: 1px solid #ddd; padding: 1px 5px; border-radius: 4px; }
#cr { display: none; }
footer { font-size: 12px; color: #bbb; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>TVC Ticker Demo</h1>
  <p>Nattoenzym — 1080 × 1920 px · thu nhỏ 25%</p>
</header>
<div class="main">
  <div class="screen-col">
    <span class="screen-label">PREVIEW</span>
    <div id="tvc-wrap">
      <video id="ad-video" autoplay loop muted playsinline></video>
      <div id="overlay">
        <span id="overlay-msg">Đang tải…</span>
        <button id="play-btn" onclick="forcePlay()">▶ Nhấn để phát</button>
      </div>
      <div id="live-badge"><div id="ld"></div><span>LIVE</span></div>
      <div id="to"><div id="ts"></div></div>
    </div>
    <span class="screen-label">Thu nhỏ 25%</span>
  </div>
  <div class="ctrl-col">
    <div>
      <label class="lbl">Nội dung chạy chữ</label>
      <textarea id="ti" rows="3">ĐÂY LÀ DEMO HƯỚNG DẪN QUÉT NFC</textarea>
    </div>
    <div>
      <label class="lbl">Cỡ chữ — <b id="fsv">9</b>px <small>(≈ <span id="fsvr">36</span>px trên màn)</small></label>
      <input type="range" id="fsr" min="8" max="18" value="9" step="1">
    </div>
    <div>
      <label class="lbl">Font chữ</label>
      <div class="pills">
        <div class="pill ff" data-ff="system-ui,sans-serif">Mặc định</div>
        <div class="pill ff on" data-ff="'Inter',sans-serif" style="font-family:Inter;">Inter</div>
        <div class="pill ff" data-ff="Roboto,sans-serif" style="font-family:Roboto;">Roboto</div>
        <div class="pill ff" data-ff="Oswald,sans-serif" style="font-family:Oswald;">Oswald</div>
        <div class="pill ff" data-ff="'Bebas Neue',sans-serif" style="font-family:'Bebas Neue';">Bebas</div>
        <div class="pill ff" data-ff="Montserrat,sans-serif" style="font-family:Montserrat;">Montserrat</div>
      </div>
    </div>
    <div>
      <label class="lbl">Kiểu nền ticker</label>
      <div class="pills">
        <div class="pill bg" data-m="clear">Trong suốt</div>
        <div class="pill bg on" data-m="dark">Mờ tối</div>
        <div class="pill bg" data-m="color">Màu đặc</div>
        <div class="pill bg" data-m="gradient">Gradient</div>
      </div>
    </div>
    <div id="cr">
      <label class="lbl">Màu nền</label>
      <div class="swatches">
        <div class="sw bc on" data-bc="#CC0000" style="background:#CC0000;"></div>
        <div class="sw bc" data-bc="#E85C00" style="background:#E85C00;"></div>
        <div class="sw bc" data-bc="#0055A5" style="background:#0055A5;"></div>
        <div class="sw bc" data-bc="#006B3C" style="background:#006B3C;"></div>
        <div class="sw bc" data-bc="#5B2D8E" style="background:#5B2D8E;"></div>
        <div class="sw bc" data-bc="#1A1A1A" style="background:#1A1A1A;border-color:#555;"></div>
      </div>
    </div>
    <div class="two-col">
      <div>
        <label class="lbl">Màu chữ</label>
        <div class="swatches">
          <div class="sw tc on" data-tc="#FFFFFF" style="background:#fff;border-color:#ccc;"></div>
          <div class="sw tc" data-tc="#FFE040" style="background:#FFE040;"></div>
          <div class="sw tc" data-tc="#66FFCC" style="background:#66FFCC;"></div>
          <div class="sw tc" data-tc="#FF8888" style="background:#FF8888;"></div>
        </div>
      </div>
      <div>
        <label class="lbl">Tốc độ — <b id="sv">50</b>px/s</label>
        <input type="range" id="sr" min="20" max="250" value="50" step="5">
      </div>
    </div>
    <div class="actions">
      <button id="bp" class="btn">Tạm dừng ⏸</button>
      <button id="bx" class="btn icon" title="Reset vị trí">↺</button>
    </div>
    <p class="hint">Thay nội dung → ticker cập nhật ngay. <kbd>Ctrl+Enter</kbd> reset vị trí.</p>
  </div>
</div>
<footer>Chicilon Media — C-Player TVC Ticker Demo</footer>

try {
  var bin = atob(B64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  var blob = new Blob([bytes], { type: 'video/webm' });
  var url = URL.createObjectURL(blob);
  vid.src = url;
  vid.load();
  vid.play().then(hideOverlay).catch(function() {
    overlayMsg.textContent = 'Nhấn để phát video';
    playBtn.style.display = 'block';
  });
  vid.addEventListener('canplay', function() {
    vid.play().then(hideOverlay).catch(function(){});
  });
} catch(e) {
  overlayMsg.textContent = 'Lỗi: ' + e.message;
  playBtn.style.display = 'block';
}

// Ticker
var toEl=document.getElementById('to'),tsEl=document.getElementById('ts');
var tiEl=document.getElementById('ti'),srEl=document.getElementById('sr'),svEl=document.getElementById('sv');
var crEl=document.getElementById('cr'),ldEl=document.getElementById('ld');
var fsrEl=document.getElementById('fsr'),fsvEl=document.getElementById('fsv'),fsvrEl=document.getElementById('fsvr');
var bpEl=document.getElementById('bp'),bxEl=document.getElementById('bx');
var W=270, posX=W, spd=50, paused=false, going=true, lt=null;
var bgMode='gradient', brandColor='#CC0000', textColor='#FFFFFF';
var fontSize=9, fontFamily="'Inter',sans-serif", blinkN=0;

function updateTickerSize() {
  tsEl.style.fontSize=fontSize+'px'; tsEl.style.fontFamily=fontFamily;
  var h;
  if (bgMode==='gradient') {
    h=Math.round(fontSize*4.5); toEl.style.height=h+'px';
    var lh=Math.round(fontSize*1.8); tsEl.style.top=(h-lh)+'px'; tsEl.style.lineHeight=lh+'px';
  } else {
    h=Math.round(fontSize*2.5); toEl.style.height=h+'px'; tsEl.style.top='0'; tsEl.style.lineHeight=h+'px';
  }
}
function applyMode(m) {
  bgMode=m; tsEl.style.textShadow='none'; crEl.style.display='none';
  if (m==='clear') { toEl.style.background='transparent'; tsEl.style.textShadow='-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,0 0 10px rgba(0,0,0,.95)'; }
  else if (m==='dark') { toEl.style.background='rgba(0,0,0,0.62)'; }
  else if (m==='color') { toEl.style.background=brandColor+'CC'; crEl.style.display='block'; }
  else if (m==='gradient') { toEl.style.background='linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.85) 100%)'; tsEl.style.textShadow='0 1px 4px rgba(0,0,0,.7)'; }
  updateTickerSize();
}
function frame(t) {
  if (going&&!paused&&lt!==null) { posX-=spd*(t-lt)/1000; if(posX<-(tsEl.offsetWidth+20)) posX=W; tsEl.style.transform='translateX('+Math.round(posX)+'px)'; }
  if (++blinkN%60===0) ldEl.style.opacity=ldEl.style.opacity==='0'?'1':'0';
  lt=t; requestAnimationFrame(frame);
}
applyMode('gradient'); tsEl.textContent=tiEl.value; tsEl.style.color=textColor;
requestAnimationFrame(frame);
tiEl.addEventListener('input',function(){ tsEl.textContent=tiEl.value; });
tiEl.addEventListener('keydown',function(e){ if(e.ctrlKey&&e.key==='Enter'){posX=W;lt=null;} });
srEl.oninput=function(){ spd=+srEl.value; svEl.textContent=spd; };
fsrEl.oninput=function(){ fontSize=+fsrEl.value; fsvEl.textContent=fontSize; fsvrEl.textContent=fontSize*4; updateTickerSize(); };
bpEl.onclick=function(){ paused=!paused; lt=null; bpEl.textContent=paused?'Tiếp tục ▶':'Tạm dừng ⏸'; };
bxEl.onclick=function(){ posX=W; paused=false; lt=null; bpEl.textContent='Tạm dừng ⏸'; };
document.querySelectorAll('.pill.ff').forEach(function(b){ b.onclick=function(){ document.querySelectorAll('.pill.ff').forEach(function(el){el.classList.remove('on');}); b.classList.add('on'); fontFamily=b.dataset.ff; updateTickerSize(); }; });
document.querySelectorAll('.pill.bg').forEach(function(b){ b.onclick=function(){ document.querySelectorAll('.pill.bg').forEach(function(el){el.classList.remove('on');}); b.classList.add('on'); applyMode(b.dataset.m); }; });
document.querySelectorAll('.sw.bc').forEach(function(s){ s.onclick=function(){ document.querySelectorAll('.sw.bc').forEach(function(el){el.classList.remove('on');}); s.classList.add('on'); brandColor=s.dataset.bc; if(bgMode==='color') toEl.style.background=brandColor+'CC'; }; });
document.querySelectorAll('.sw.tc').forEach(function(s){ s.onclick=function(){ document.querySelectorAll('.sw.tc').forEach(function(el){el.classList.remove('on');}); s.classList.add('on'); textColor=s.dataset.tc; tsEl.style.color=textColor; }; });
</script>
